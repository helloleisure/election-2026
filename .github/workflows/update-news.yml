name: 뉴스·캠프 자동 현행화

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Perplexity API로 최신 뉴스 수집
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error, datetime, re

          api_key = os.environ.get('PERPLEXITY_API_KEY', '')
          if not api_key:
              print("::warning::PERPLEXITY_API_KEY not set — skipping news update")
              exit(0)

          # 현재 KST 시각
          kst = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          kst_str = kst.strftime('%Y.%m.%d %H:%M')
          kst_date = kst.strftime('%Y-%m-%d')

          TRUSTED_DOMAINS = [
              "yna.co.kr", "namdonews.com", "kjmbc.co.kr", "nocutnews.co.kr",
              "jeonnam.mbc.co.kr", "newsis.com", "news1.kr", "hani.co.kr",
              "ohmynews.com", "pressian.com", "sentv.co.kr", "ikbc.co.kr"
          ]

          PROMPT = f"""지금 한국 시간 {kst_str}. 전남광주통합특별시장 결선(민형배·김영록) 및 광주·전남 6.3 지방선거 최신 뉴스 10개를 최신순으로 찾아줘. 최근 3일 기사 우선, 부족하면 최근 7일. JSON 배열만 응답. 필드: title(기사 제목), source(언론사명), date(YYYY.MM.DD HH:MM), url(기사 URL), candidate(김영록|민형배|공통|기타), category(결선|공약·정책|여론조사|기초단체장|광역의원|선거일정|공방·논란), tags(키워드 배열 최대3개), region(광주|전남동부|전남서부|전남북부|광주·전남), summary(20자 이내). JSON만, 마크다운 없이."""

          payload = json.dumps({
              "model": "sonar-pro",
              "messages": [
                  {"role": "system", "content": "You are a JSON-only API. Output ONLY a valid JSON array. No markdown fences, no explanation."},
                  {"role": "user", "content": PROMPT}
              ],
              "temperature": 0.1,
              "max_tokens": 4000,
              "search_recency_filter": "week",
              "return_citations": True,
              "search_domain_filter": TRUSTED_DOMAINS
          }).encode()

          req = urllib.request.Request(
              "https://api.perplexity.ai/chat/completions",
              data=payload,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.loads(r.read())
          except urllib.error.HTTPError as e:
              body = e.read().decode()[:200]
              print(f"::warning::API 오류 {e.code}: {body} — sonar 모델로 재시도")
              payload2 = json.loads(payload)
              payload2["model"] = "sonar"
              req2 = urllib.request.Request(
                  "https://api.perplexity.ai/chat/completions",
                  data=json.dumps(payload2).encode(),
                  headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req2, timeout=30) as r:
                  data = json.loads(r.read())

          raw = data["choices"][0]["message"]["content"]
          citations = data.get("citations", [])   # return_citations 결과 (검증된 URL)
          txt = re.sub(r'```[\w]*\n?', '', raw).replace('```', '').strip()
          m = re.search(r'\[[\s\S]*\]', txt)
          if not m:
              print("::warning::JSON 파싱 실패 — 뉴스 업데이트 건너뜀")
              exit(0)

          fetched = json.loads(m.group(0))
          if not fetched:
              print("::warning::빈 배열 — 뉴스 업데이트 건너뜀")
              exit(0)

          print(f"citations {len(citations)}개 수신")

          region_to_tab = {
              '광주': 'gwangju', '전남동부': 'jeonnam', '전남서부': 'jeonnam',
              '전남북부': 'jeonnam', '광주·전남전체': 'mayor', '광주·전남': 'mayor'
          }

          def parse_date(s):
              if not s: return kst.strftime('%Y-%m-%dT%H:%M:%S+09:00')
              try:
                  norm = s.replace('.', '-').replace(' ', 'T')
                  if '+' not in norm and 'Z' not in norm:
                      norm += '+09:00'
                  dt = datetime.datetime.fromisoformat(norm)
                  return dt.isoformat()
              except:
                  return kst.strftime('%Y-%m-%dT%H:%M:%S+09:00')

          news_items = []
          for i, item in enumerate(fetched[:10]):
              # citations[i]로 URL 보완: JSON URL 없거나 http 아니면 citation 사용
              raw_url = item.get("url", "")
              url = raw_url if raw_url.startswith("http") else (citations[i] if i < len(citations) else "")
              news_items.append({
                  "id": int(kst.timestamp()) + i,
                  "title": item.get("title", ""),
                  "summary": item.get("summary", ""),
                  "source": item.get("source", "미상"),
                  "url": url,
                  "category": region_to_tab.get(item.get("region", ""), "mayor"),
                  "newsType": item.get("category", ""),
                  "candidate": item.get("candidate", ""),
                  "tags": item.get("tags", []) if isinstance(item.get("tags"), list) else [],
                  "region": item.get("region", ""),
                  "jndc_relevance": False,
                  "publishedAt": parse_date(item.get("date", "")),
                  "aiSummary": ""
              })

          # 최신순 정렬
          news_items.sort(key=lambda x: x["publishedAt"], reverse=True)

          js_content = f"// 자동 업데이트: {kst_str} (KST)\nconst NEWS = {json.dumps(news_items, ensure_ascii=False, indent=2)};\n"
          with open("data/news.js", "w", encoding="utf-8") as f:
              f.write(js_content)

          print(f"✅ {len(news_items)}건 뉴스 업데이트 완료 ({kst_str} KST)")
          PYEOF

      - name: Perplexity API로 캠프 상황실 현행화
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          python3 - << 'PYEOF'
          import os, json, urllib.request, urllib.error, datetime, re

          api_key = os.environ.get('PERPLEXITY_API_KEY', '')
          if not api_key:
              print("::warning::PERPLEXITY_API_KEY not set — skipping camp update")
              exit(0)

          kst = datetime.datetime.utcnow() + datetime.timedelta(hours=9)
          kst_str = kst.strftime('%Y.%m.%d %H:%M')
          kst_date = kst.strftime('%Y-%m-%d')

          PROMPT = f"""지금 한국 시간은 {kst_str} 입니다.
          전남광주특별시장 결선 후보 김영록, 민형배 캠프의 최신 활동 소식을 찾아줘.
          조건: {kst_date} 기준 최근 7일 이내 실제 뉴스 기반. 각 후보 5개씩 총 10개.
          JSON 배열만 응답. 형식: [{{"camp":"kim","text":"활동 내용 (출처: 언론사명)","time":"ISO8601 시각"}}]
          camp 값은 kim(김영록) 또는 min(민형배). time은 ISO8601+09:00 형식.
          JSON 배열만, 마크다운 없이."""

          payload = json.dumps({
              "model": "sonar-pro",
              "messages": [
                  {"role": "system", "content": "You are a JSON-only API. Output ONLY a valid JSON array."},
                  {"role": "user", "content": PROMPT}
              ],
              "temperature": 0.1,
              "max_tokens": 2000
          }).encode()

          req = urllib.request.Request(
              "https://api.perplexity.ai/chat/completions",
              data=payload,
              headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}
          )

          try:
              with urllib.request.urlopen(req, timeout=30) as r:
                  data = json.loads(r.read())
          except urllib.error.HTTPError as e:
              body = e.read().decode()[:200]
              print(f"::warning::캠프 API 오류 {e.code}: {body} — sonar 재시도")
              payload2 = json.loads(payload)
              payload2["model"] = "sonar"
              req2 = urllib.request.Request(
                  "https://api.perplexity.ai/chat/completions",
                  data=json.dumps(payload2).encode(),
                  headers={"Authorization": f"Bearer {api_key}", "Content-Type": "application/json"}
              )
              with urllib.request.urlopen(req2, timeout=30) as r:
                  data = json.loads(r.read())

          raw = data["choices"][0]["message"]["content"]
          txt = re.sub(r'```[\w]*\n?', '', raw).replace('```', '').strip()
          m = re.search(r'\[[\s\S]*\]', txt)
          if not m:
              print("::warning::캠프 JSON 파싱 실패 — 건너뜀")
              exit(0)

          items = json.loads(m.group(0))
          if not items:
              print("::warning::캠프 빈 배열 — 건너뜀")
              exit(0)

          def parse_time(s):
              if not s: return kst.strftime('%Y-%m-%dT%H:%M:%S+09:00')
              try:
                  norm = s if ('+' in s or 'Z' in s) else s + '+09:00'
                  datetime.datetime.fromisoformat(norm)
                  return norm
              except:
                  return kst.strftime('%Y-%m-%dT%H:%M:%S+09:00')

          kim_updates = [{"text": i["text"], "time": parse_time(i.get("time",""))}
                         for i in items if i.get("camp") == "kim"][:5]
          min_updates = [{"text": i["text"], "time": parse_time(i.get("time",""))}
                         for i in items if i.get("camp") == "min"][:5]

          # 기존 파일 읽어 updates만 교체 (color, label 등 정적 값 보존)
          camps = {
              "kim-young-rok": {
                  "label": "김영록 캠프",
                  "color": "#22c55e",
                  "updates": kim_updates
              },
              "min-hyung-bae": {
                  "label": "민형배 캠프",
                  "color": "#60a5fa",
                  "updates": min_updates
              }
          }

          js_content = f"// 자동 업데이트: {kst_str} (KST)\nconst CAMPS = {json.dumps(camps, ensure_ascii=False, indent=2)};\n"
          with open("data/camps.js", "w", encoding="utf-8") as f:
              f.write(js_content)

          print(f"✅ 캠프 상황실 업데이트 완료 (김영록 {len(kim_updates)}건 / 민형배 {len(min_updates)}건)")
          PYEOF

      - name: news.js · camps.js 변경 사항 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.js data/camps.js
          if git diff --staged --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "chore: 뉴스·캠프 자동 현행화 $(date +'%Y-%m-%d %H:%M') KST"
            git push
          fi
